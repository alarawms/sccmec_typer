<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="170" viewBox="0 0 900 170">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="currentColor"/>
    </marker>
    <marker id="arrowhead-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="currentColor"/>
    </marker>
  </defs>

  <style>
    .title { font: bold 16px sans-serif; fill: #333; }
    .subtitle { font: 13px sans-serif; fill: #666; }
    .gene-label { font: 11px monospace; fill: #333; }
    .region-label { font: 10px sans-serif; fill: #999; text-anchor: middle; }
    .badge { font: bold 10px sans-serif; }
    .confidence-note { font: italic 10px sans-serif; fill: #999; }
    .warning-text { font: 11px sans-serif; fill: #E74C3C; }
    .missing { stroke-dasharray: 5,3; fill: none; stroke-width: 2; }
  </style>

  <!-- Title banner -->
  <text x="20" y="30" class="title">
    SCCmec n/a (Plasmid) (n/a)
  </text>
  <text x="20" y="50" class="subtitle">
    mec: Plasmid-borne (mecB) | ccr: Negative | Confidence: High (1.00)
  </text>

  <!-- Confidence badge -->
  <rect x="780" y="15" width="100" height="28" rx="4"
        fill="#27AE60" opacity="0.9"/>
  <text x="830" y="34" text-anchor="middle" class="badge" fill="white">
    High 100%
  </text>

  <!-- J region backgrounds -->
  
  <rect x="58" y="75" width="40" height="30"
        fill="#F0F0F0" rx="2"/>
  <text x="78.0" y="117" class="region-label">
    J3
  </text>
  
  <rect x="106" y="75" width="40" height="30"
        fill="#F0F0F0" rx="2"/>
  <text x="126.0" y="117" class="region-label">
    J2
  </text>
  
  <rect x="242" y="75" width="40" height="30"
        fill="#F0F0F0" rx="2"/>
  <text x="262.0" y="117" class="region-label">
    J1
  </text>
  

  <!-- DR boundaries -->
  
  <polygon points="20,78 50,90 20,102" fill="#DC143C" opacity="0.8"/>
  
  <polygon points="290,78 320,90 290,102" fill="#DC143C" opacity="0.8"/>
  

  <!-- Gene arrows -->
  
  
  <rect x="154" y="78" width="80" height="24"
        fill="#DC143C" opacity="1.0" rx="2"/>
  
  <polygon points="154,78 228,78 234,90 228,102 154,102" fill="#DC143C" opacity="1.0"/>
  
  
  <text x="194.0" y="74" class="gene-label" text-anchor="middle">
    mecB
  </text>
  
  <text x="194.0" y="114" class="gene-label" text-anchor="middle"
        fill="#27AE60">
    100%
  </text>
  
  

  <!-- Component confidence badges -->
  
  <text x="550.0" y="140" class="badge" fill="#27AE60">
    mec (Plasmid-borne (mecB)): High (1.00)
  </text>
  

  <!-- Warnings -->
  

  
</svg>